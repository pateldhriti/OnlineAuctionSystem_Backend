{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-4 col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <h2 class="card-title h4 mb-3">Password updated</h2>
                <p class="text-body-secondary">Your password has been changed. You can now log in.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-2">Log in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
