{% extends 'base.html' %}

{% block title %}Check Your Email — AuctionHub{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-4 col-md-6 text-center">
        <div class="d-inline-flex align-items-center justify-content-center mb-3" style="width:80px;height:80px;border-radius:20px;background:var(--success-gradient);color:#fff;font-size:2rem;">
            <i class="bi bi-envelope-check-fill"></i>
        </div>
        <h2 class="fw-800 mb-3" style="font-weight:800;">Check your email</h2>
        <p class="text-body-secondary mb-4">
            If an account exists with that email address, we've sent a link to reset
            your password. It should arrive shortly.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-glow px-4 py-2">
            <i class="bi bi-arrow-left me-1"></i> Back to Login
        </a>
    </div>
</div>
{% endblock %}
