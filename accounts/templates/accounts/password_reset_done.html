{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-4 col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <h2 class="card-title h4 mb-3">Check your email</h2>
                <p class="text-body-secondary">
                    If an account exists with that email address, we've sent a link to reset
                    your password. It should arrive shortly.
                </p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-2">Back to login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
