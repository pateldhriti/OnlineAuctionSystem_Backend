{% extends 'base.html' %}

{% block title %}Create Listing{% endblock %}

{% block content %}
    <h2>Create Listing</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create listing</button>
    </form>
    <p><a href="{% url 'listings:list' %}">Back to listings</a></p>
{% endblock %}
