<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Auction{% endblock %}</title>
</head>
<body>
    <header>
        <h1><a href="{% url 'home' %}">Online Auction</a></h1>
        <nav>
            <a href="{% url 'listings:list' %}">Listings</a>
            {% if user.is_authenticated %}
                | <a href="{% url 'listings:create' %}">Create listing</a>
                | <a href="{% url 'accounts:logout' %}">Logout ({{ user.username }})</a>
            {% else %}
                | <a href="{% url 'accounts:login' %}">Login</a>
                | <a href="{% url 'accounts:register' %}">Register</a>
            {% endif %}
        </nav>
    </header>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
